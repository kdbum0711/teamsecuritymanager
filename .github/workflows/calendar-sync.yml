name: Google Calendar Sync
on:
  schedule:
    - cron: '0 15 * * *' # KST 00:00 (자정) 매일 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Sync API
        run: |
          curl -X POST https://teamsecuritymanager.vercel.app/api/cron/sync-calendar -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
